name: Release

# On every push to main: run the tests, then let python-semantic-release work
# out the next version from the Conventional Commits, bump it, tag, build with
# uv, and create the GitHub release. The new artifact is then uploaded to PyPI
# via Trusted Publishing (OIDC) — no tokens or secrets required for PyPI.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/test.yml   # tests gate the release

  release:
    needs: test
    runs-on: ubuntu-latest
    concurrency: release          # never run two releases at once
    permissions:
      contents: write             # push the version bump + tag, create the release
      id-token: write             # PyPI Trusted Publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # semantic-release needs full history + tags
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Semantic release (version, tag, changelog, GitHub release, build)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uvx --from "python-semantic-release>=9,<10" semantic-release version
      - name: Publish to PyPI
        if: hashFiles('dist/*') != ''   # only when a new version was built
        run: uv publish --trusted-publishing always
