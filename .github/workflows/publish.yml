name: Publish to PyPI

# Build and publish the package when a GitHub Release is published, or on
# manual dispatch. Uses uv for everything and PyPI Trusted Publishing (OIDC),
# so no API tokens or secrets are needed.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync (project + test group)
        run: uv sync
      - name: Run tests
        run: uv run pytest -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ashp
    permissions:
      id-token: write          # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Build sdist and wheel
        run: uv build
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
